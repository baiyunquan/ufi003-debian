name: Build UFI003 EDL package

on:
  workflow_dispatch:
    inputs:
      debian_tag:
        description: Upstream ufi003-debian release tag
        required: false
        default: 13.5-15
      kernel_tag:
        description: Upstream ufi003-kernel release tag
        required: false
        default: 6.12.94-1
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-edl-flash.yml'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  repack:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DEBIAN_TAG: ${{ inputs.debian_tag || '13.5-15' }}
      KERNEL_TAG: ${{ inputs.kernel_tag || '6.12.94-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get -y install android-sdk-libsparse-utils e2fsprogs python3 xz-utils

      - name: Build EDL package from upstream releases
        run: bash scripts/make-edl-package.sh output

      - name: List artifacts
        run: ls -lh output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ufi003-debian-edl-package
          path: output
